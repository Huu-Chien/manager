<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Công việc</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary-color: #1a73e8;
            --danger-color: #d93025;
            --bg-color: #f1f3f4;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
        }

        .container { max-width: 1000px; margin: auto; }
        h2 { text-align: center; color: var(--primary-color); margin: 20px 0; }

        /* Form nhập liệu */
        .input-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(60,64,67,0.3);
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .full-width { grid-column: span 2; }
        input, select, textarea { padding: 12px; border: 1px solid #dadce0; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .btn-add { background: var(--primary-color); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Bảng cho máy tính */
        .desktop-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            display: none;
        }
        .desktop-table th, .desktop-table td { padding: 15px; border-bottom: 1px solid #f1f3f4; text-align: left; }
        .desktop-table th { background: #f8f9fa; color: #5f6368; }

        /* Nút xóa trên máy tính */
        .btn-del-text { color: var(--danger-color); border: none; background: none; cursor: pointer; font-weight: bold; }
        .btn-del-text:hover { text-decoration: underline; }

        /* Danh sách Card cho điện thoại */
        .mobile-list { display: block; }
        .task-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: 0 1px 2px rgba(60,64,67,0.3);
            position: relative;
        }
        .task-card h3 { margin: 0 0 8px 0; color: var(--primary-color); }
        
        /* Nút xóa trên điện thoại (Dấu X góc phải) */
        .btn-del-mobile {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #fce8e6;
            color: var(--danger-color);
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
        }

        .status-select { margin-top: 10px; padding: 8px; border-radius: 6px; border: 1px solid var(--primary-color); background: #e8f0fe; width: 100%; }
        .deadline-text { color: var(--danger-color); font-weight: bold; }

        @media (min-width: 768px) {
            .desktop-table { display: table; }
            .mobile-list { display: none; }
            body { padding: 30px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Quản lý công việc</h2>

    <div class="input-card">
        <input type="text" id="taskName" class="full-width" placeholder="Tên công việc...">
        <input type="text" id="taskAssignee" placeholder="Người nhận...">
        <input type="date" id="taskDeadline">
        <select id="taskProgress" class="full-width">
            <option value="0%">🔴 0% - Mới giao</option>
            <option value="50%">🟡 50% - Đang làm</option>
            <option value="100%">🟢 100% - Hoàn thành</option>
        </select>
        <textarea id="taskNote" class="full-width" placeholder="Ghi chú chi tiết..."></textarea>
        <button class="btn-add full-width" onclick="addTask()">+ GIAO VIỆC</button>
    </div>

    <table class="desktop-table">
        <thead>
            <tr>
                <th>Công việc</th>
                <th>Người nhận</th>
                <th>Hết hạn</th>
                <th>Tiến độ</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="taskBodyDesktop"></tbody>
    </table>

    <div class="mobile-list" id="taskBodyMobile"></div>
</div>

<script>
    // CẤU HÌNH FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyBMGTJmJttHtNxTid8Y-rR9eBALLICr-7k",
        authDomain: "manager-2349e.firebaseapp.com",
        databaseURL: "https://manager-2349e-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "manager-2349e",
        storageBucket: "manager-2349e.firebasestorage.app",
        messagingSenderId: "960177874955",
        appId: "1:960177874955:web:46a94bec06d6d826dd3f0e",
        measurementId: "G-4K63VTSBLJ"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function addTask() {
        const name = document.getElementById('taskName').value;
        const assignee = document.getElementById('taskAssignee').value;
        const deadline = document.getElementById('taskDeadline').value;
        const progress = document.getElementById('taskProgress').value;
        const note = document.getElementById('taskNote').value;
        if (!name || !assignee) return alert("Nhập đủ thông tin!");
        db.ref('tasks').push({ name, assignee, deadline, progress, note });
        document.getElementById('taskName').value = "";
    }

    db.ref('tasks').on('value', (snapshot) => {
        const data = snapshot.val();
        const dBody = document.getElementById('taskBodyDesktop');
        const mBody = document.getElementById('taskBodyMobile');
        dBody.innerHTML = ""; mBody.innerHTML = "";
        if (!data) return;

        Object.keys(data).reverse().forEach(id => {
            const t = data[id];
            const dateStr = t.deadline ? new Date(t.deadline).toLocaleDateString('vi-VN') : 'Không có';

            // Desktop Row
            dBody.innerHTML += `
                <tr>
                    <td><b>${t.name}</b><br><small>${t.note || ''}</small></td>
                    <td>${t.assignee}</td>
                    <td class="deadline-text">${dateStr}</td>
                    <td>
                        <select class="status-select" onchange="updateProgress('${id}', this.value)">
                            <option value="0%" ${t.progress==='0%'?'selected':''}>0%</option>
                            <option value="50%" ${t.progress==='50%'?'selected':''}>50%</option>
                            <option value="100%" ${t.progress==='100%'?'selected':''}>100%</option>
                        </select>
                    </td>
                    <td><button class="btn-del-text" onclick="deleteTask('${id}')">Xóa</button></td>
                </tr>`;

            // Điện thoại
            mBody.innerHTML += `
                <div class="task-card">
                    <button class="btn-del-mobile" onclick="deleteTask('${id}')">✕</button>
                    <h3>${t.name}</h3>
                    <div>👤 ${t.assignee} | 📅 <span class="deadline-text">${dateStr}</span></div>
                    <select class="status-select" onchange="updateProgress('${id}', this.value)">
                        <option value="0%" ${t.progress==='0%'?'selected':''}>Tiến độ: 0%</option>
                        <option value="50%" ${t.progress==='50%'?'selected':''}>Tiến độ: 50%</option>
                        <option value="100%" ${t.progress==='100%'?'selected':''}>Tiến độ: 100%</option>
                    </select>
                </div>`;
        });
    });

    function updateProgress(id, val) { db.ref('tasks/' + id).update({ progress: val }); }
    function deleteTask(id) { if(confirm("Xóa việc này?")) db.ref('tasks/' + id).remove(); }
</script>
</body>
</html>
